<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Revolution Print Platform</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="mobile-block" id="mobileBlock">
    <div class="mobile-block-icon">
      <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#b87333" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
    </div>
    <h2 style="margin:0 0 8px;font-size:20px;color:#1a1a2e;">Не доступно на мобильной версии</h2>
    <p style="margin:0;color:#666;font-size:14px;">Откройте на персональном компьютере</p>
  </div>
  <div class="toast" id="toast"></div>

  <div class="modal-backdrop" id="modalBackdrop">
    <div class="modal" id="modal">
      <div class="modal-head">
        <b id="modalTitle">Окно</b>
        <button class="close-x" id="modalClose" title="Закрыть"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
      </div>
      <div id="modalBody"></div>
    </div>
  </div>

  <div class="app" id="app">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-badge"></div>
        <div class="brand-title">
          <b>Revolution Print</b>
          <span>Platform</span>
        </div>
      </div>

      <nav class="nav" id="nav">
        <!-- Навигация будет вставлена здесь -->
      </nav>

      <div class="sidebar-footer">
        <div class="sidebar-avatar-wrap" id="sidebarAvatarWrap">
          <div class="avatar" id="sidebarAvatar"></div>
          <span class="status-dot sidebar-status-dot" id="sidebarStatusDot"></span>
        </div>
        <div class="who">
          <b id="whoName">—</b>
          <span id="whoRole">—</span>
        </div>
      </div>
    </aside>

    <div class="main">
      <header class="topbar">
        <div>
          <h1 id="topTitle">Главная</h1>
          <small id="topSub">Рабочее пространство</small>
        </div>

        <div class="top-actions">
          <div class="pill" id="presencePill">В системе: 0м</div>
          <button class="icon-btn" id="btnNotif" title="Уведомления"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg></button>
          <button class="icon-btn" id="btnProfile" title="Личный кабинет"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></button>
          <button class="icon-btn" id="btnLogout" title="Выход"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></button>
        </div>
      </header>

      <div class="content" id="content">
        <!-- Контент страниц будет вставлен здесь -->
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="js/api.js"></script>
  <script src="js/utils/icons.js"></script>
  <script src="js/utils/helpers.js"></script>
  <script src="js/utils/toast.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/pages/dashboard.js"></script>
  <script src="js/pages/clients.js"></script>
  <script src="js/pages/orders.js"></script>
  <script src="js/pages/orderDetail.js"></script>
  <script src="js/pages/documents.js"></script>
  <script src="js/pages/documentCreate.js"></script>
  <script src="js/pages/production.js"></script>
  <script src="js/pages/chat.js"></script>
  <script src="js/pages/admin.js"></script>
  <script src="js/pages/profile.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
