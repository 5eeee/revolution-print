# =============================================================
# Revolution Print — Production Docker Compose
# =============================================================
# Использование:
#   cp .env.production.example .env.production
#   # заполните .env.production
#   docker compose -f docker-compose.prod.yml --env-file .env.production up -d
# =============================================================

version: "3.8"

services:
  # ---------- PostgreSQL ----------
  postgres:
    image: postgres:15-alpine
    container_name: rp_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-rev_prod}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Задайте DB_PASSWORD в .env.production}
      POSTGRES_DB: ${DB_NAME:-revolution_print}
      TZ: Europe/Moscow
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-rev_prod}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rp_net

  # ---------- Backend (Node.js) ----------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rp_api
    restart: always
    environment:
      NODE_ENV: production
      PORT: ${BACKEND_PORT:-3000}
      DATABASE_URL: postgresql://${DB_USER:-rev_prod}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-revolution_print}
      JWT_SECRET: ${JWT_SECRET:?Задайте JWT_SECRET в .env.production}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-7d}
      CORS_ORIGIN: ${CORS_ORIGIN:-}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:${BACKEND_PORT:-3000}/health',(r)=>{process.exit(r.statusCode===200?0:1)})"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - rp_net

  # ---------- Nginx (reverse-proxy + frontend) ----------
  nginx:
    image: nginx:1.25-alpine
    container_name: rp_web
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend:/usr/share/nginx/html:ro
      # SSL-сертификаты (Let's Encrypt или свои)
      - ./nginx/ssl:/etc/nginx/ssl:ro
      # Проксирование загруженных файлов напрямую из Nginx
      - uploads_data:/app/uploads:ro
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - rp_net

volumes:
  pg_data:
    driver: local
  uploads_data:
    driver: local

networks:
  rp_net:
    driver: bridge
